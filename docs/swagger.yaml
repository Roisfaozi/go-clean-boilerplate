        data.
      parameters:
      - description: Upload ID
        in: path
        name: id
        required: true
        type: string
      - description: TUS protocol version (must be 1.0.0)
        in: header
        name: Tus-Resumable
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "404":
          description: Upload not found
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
