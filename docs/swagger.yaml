          description: OK
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "404":
          description: Upload not found
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
      security:
      - BearerAuth: []
      summary: Check upload offset
      tags:
      - upload
    patch:
      consumes:
      - application/octet-stream
      description: Sends a chunk of binary data to an existing resumable upload session.
      parameters:
      - description: Upload ID
        in: path
        name: id
        required: true
        type: string
      - description: TUS protocol version (must be 1.0.0)
        in: header
        name: Tus-Resumable
        required: true
        type: string
      - description: Current offset of the chunk being sent
        in: header
        name: Upload-Offset
        required: true
        type: integer
      - description: Must be application/offset+octet-stream
        in: header
        name: Content-Type
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "409":
          description: Overlap or mismatching offset
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
      security:
      - BearerAuth: []
      summary: Upload file chunk
      tags:
      - upload
