      description: Deletes a specific user by their ID. Accessible only by admins/superadmins.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'message: User deleted successfully'
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.SwaggerGeneralResponseWrapper'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      security:
      - BearerAuth: []
      summary: Delete user by ID
      tags:
      - users
    get:
      description: Retrieves profile information for a specific user by their ID.
        Accessible only by admins/superadmins.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.SwaggerUserResponseWrapper'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "403":
