host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server for a modular application with JWT authentication.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Modular API with JWT
  version: "1.0"
paths:
  /access-rights:
    get:
      description: Retrieves a list of all available access rights.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      security:
      - BearerAuth: []
      summary: List all access rights
      tags:
      - access-rights
    post:
      consumes:
      - application/json
      description: Creates a new access right (resource group).
      parameters:
      - description: Create Access Right Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_modules_access_model.CreateAccessRightRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      security:
      - BearerAuth: []
      summary: Create access right
      tags:
      - access-rights
  /access-rights/link:
    post:
      consumes:
      - application/json
      description: Associates an endpoint with a specific access right.
      parameters:
      - description: Link Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_modules_access_model.LinkEndpointRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Endpoint linked successfully
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      security:
      - BearerAuth: []
      summary: Link endpoint to access right
      tags:
      - access-rights
  /auth/login:
    post:
      consumes:
      - application/json
      description: Logs in a user by validating credentials and returns an access
        token and a refresh token cookie.
      parameters:
      - description: Login Credentials
        in: body
        name: loginRequest
        required: true
        schema:
          $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_modules_auth_model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.SwaggerLoginResponseWrapper'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      summary: User Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Logs out the current user by revoking their session.
      produces:
      - application/json
      responses:
        "200":
          description: 'message: logged out successfully'
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.SwaggerGeneralResponseWrapper'
        "401":
          description: User not authenticated or invalid session
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      security:
      - BearerAuth: []
      summary: User Logout
      tags:
      - auth
  /auth/refresh:
    post:
      description: Refreshes an access token using a valid refresh token provided
        in an HTTP-only cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.SwaggerTokenResponseWrapper'
        "401":
          description: Refresh token not found or invalid
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      summary: Refresh Access Token
      tags:
      - auth
  /endpoints:
    post:
      consumes:
      - application/json
      description: Registers a new API endpoint in the system.
      parameters:
      - description: Create Endpoint Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_modules_access_model.CreateEndpointRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      security:
      - BearerAuth: []
      summary: Create endpoint
      tags:
      - endpoints
  /permissions:
    get:
      description: Retrieves all policies from the Casbin enforcer.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      security:
      - BearerAuth: []
      summary: Get all permissions
      tags:
      - permissions
    put:
      consumes:
      - application/json
      description: Updates an existing policy rule.
      parameters:
      - description: Update Permission Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_modules_permission_model.UpdatePermissionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Permission updated successfully
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "404":
          description: Policy to update not found
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      security:
      - BearerAuth: []
      summary: Update permission
      tags:
      - permissions
  /permissions/{role}:
    get:
      description: Retrieves all permissions associated with a specific role.
      parameters:
      - description: Role Name
        in: path
        name: role
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "400":
          description: Role parameter required
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      security:
      - BearerAuth: []
      summary: Get permissions for role
      tags:
      - permissions
  /permissions/assign-role:
    post:
      consumes:
      - application/json
      description: Assigns a specific role to a user.
      parameters:
      - description: Assign Role Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_modules_permission_model.AssignRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Role assigned successfully
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      security:
      - BearerAuth: []
      summary: Assign role to user
      tags:
      - permissions
  /permissions/grant:
    post:
      consumes:
      - application/json
      description: Grants a specific permission (path & method) to a role.
      parameters:
      - description: Grant Permission Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_modules_permission_model.GrantPermissionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Permission granted successfully
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      security:
      - BearerAuth: []
      summary: Grant permission
      tags:
      - permissions
  /permissions/revoke:
    delete:
      consumes:
      - application/json
      description: Revokes a specific permission (path & method) from a role.
      parameters:
      - description: Revoke Permission Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_modules_permission_model.GrantPermissionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Permission revoked successfully
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      security:
      - BearerAuth: []
      summary: Revoke permission
      tags:
      - permissions
  /roles:
    get:
      description: Get a list of all available roles.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      security:
      - BearerAuth: []
      summary: List all roles
      tags:
      - roles
    post:
      consumes:
      - application/json
      description: Create a new user role.
      parameters:
      - description: Role Creation Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_modules_role_model.CreateRoleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "409":
          description: Role already exists
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
      security:
      - BearerAuth: []
      summary: Create a new role
      tags:
      - roles
  /users:
    get:
      description: Retrieves a list of all users with optional pagination and filtering.
        Accessible only by admins/superadmins.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 10)
        in: query
        name: limit
        type: integer
      - description: Filter by username
        in: query
        name: username
        type: string
      - description: Filter by email
        in: query
        name: email
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.SwaggerUserListResponseWrapper'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_casbin-db_internal_utils_response.WebResponseAny'
        "500":
