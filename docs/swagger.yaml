basePath: /api/v1
definitions:
  model.AcceptInvitationRequest:
    properties:
      name:
        description: Optional
        type: string
      password:
        description: Required for new users
        type: string
      token:
        type: string
    required:
    - token
    type: object
  model.AccessRightListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/model.AccessRightResponse'
        type: array
      meta:
        properties:
          total:
            type: integer
        type: object
    type: object
  model.AccessRightResponse:
    properties:
      created_at:
        type: integer
      description:
        type: string
      endpoints:
        items:
          $ref: '#/definitions/model.EndpointResponse'
        type: array
      id:
        type: string
      name:
        type: string
      updated_at:
        type: integer
    type: object
  model.AssignRoleRequest:
    properties:
      role:
        type: string
      user_id:
        type: string
    required:
    - role
    - user_id
    type: object
  model.BatchPermissionCheckRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/model.PermissionCheckItem'
        minItems: 1
        type: array
    required:
    - items
    type: object
  model.BatchPermissionCheckResponse:
    properties:
      results:
        additionalProperties:
          type: boolean
        type: object
    type: object
  model.CreateAccessRightRequest:
    properties:
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
    required:
    - name
    type: object
  model.CreateEndpointRequest:
    properties:
      method:
        maxLength: 10
        minLength: 1
        type: string
      path:
        maxLength: 191
        minLength: 1
        type: string
    required:
    - method
    - path
    type: object
  model.CreateOrganizationRequest:
    properties:
      name:
        maxLength: 100
        minLength: 3
        type: string
      slug:
        maxLength: 100
        minLength: 3
        type: string
    required:
    - name
    type: object
  model.CreateRoleRequest:
    properties:
      description:
        type: string
      name:
        maxLength: 50
        type: string
    required:
    - name
    type: object
  model.EndpointResponse:
    properties:
      created_at:
        type: integer
      id:
        type: string
      method:
        type: string
      path:
        type: string
    type: object
  model.ForgotPasswordRequest:
    properties:
      email:
        maxLength: 100
        type: string
    required:
    - email
    type: object
  model.GrantPermissionRequest:
    properties:
      method:
        type: string
      path:
        type: string
      role:
        type: string
    required:
    - method
    - path
    - role
    type: object
  model.InheritanceTreeResponse:
    properties:
      roles:
        items:
          $ref: '#/definitions/model.RoleNode'
        type: array
    type: object
  model.InviteMemberRequest:
    properties:
      email:
        type: string
      role_id:
        type: string
      user_id:
        description: Optional, if inviting generic email
        type: string
    required:
    - email
    - role_id
    type: object
  model.LinkEndpointRequest:
    properties:
      access_right_id:
        type: string
      endpoint_id:
        type: string
    required:
    - access_right_id
    - endpoint_id
    type: object
  model.LoginRequest:
    properties:
      password:
        maxLength: 72
        minLength: 8
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  model.LoginResponse:
    properties:
      access_token:
        type: string
      expires_at:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/model.UserInfo'
    type: object
  model.MemberResponse:
    properties:
      id:
        type: string
      joined_at:
        type: integer
      organization_id:
        type: string
      role_id:
        type: string
      status:
        type: string
      user:
        $ref: '#/definitions/model.UserResponse'
      user_id:
        type: string
    type: object
  model.OrganizationResponse:
    properties:
      created_at:
        type: integer
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
      settings:
        additionalProperties: true
        type: object
      slug:
        type: string
      status:
        type: string
      updated_at:
        type: integer
    type: object
  model.PermissionCheckItem:
    properties:
      action:
        type: string
      resource:
        type: string
    required:
    - action
    - resource
    type: object
  model.RegisterRequest:
    properties:
      email:
        maxLength: 100
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - name
    - password
    - username
    type: object
  model.RegisterUserRequest:
    properties:
      email:
        maxLength: 100
        type: string
      fullname:
        maxLength: 100
        minLength: 3
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      username:
        maxLength: 100
        minLength: 6
        type: string
    required:
    - email
    - fullname
    - password
    - username
    type: object
  model.ResetPasswordRequest:
    properties:
      new_password:
        maxLength: 72
        minLength: 8
        type: string
      token:
        maxLength: 500
        type: string
    required:
    - new_password
    - token
    type: object
  model.ResourceAggregationResponse:
    properties:
      resources:
        items:
          $ref: '#/definitions/model.ResourcePermission'
        type: array
    type: object
  model.ResourceCRUD:
    properties:
      create:
        type: boolean
      delete:
        type: boolean
      read:
        type: boolean
      update:
        type: boolean
    type: object
  model.ResourcePermission:
    properties:
      base_path:
        type: string
      endpoint_count:
        type: integer
      name:
        type: string
      role_permissions:
        additionalProperties:
          $ref: '#/definitions/model.ResourceCRUD'
        type: object
    type: object
  model.RoleInheritanceRequest:
    properties:
      child_role:
        type: string
      parent_role:
        type: string
    required:
    - child_role
    - parent_role
    type: object
  model.RoleNode:
    properties:
      children:
        items:
          $ref: '#/definitions/model.RoleNode'
        type: array
      description:
        type: string
      effective_permissions:
        items:
          items:
            type: string
          type: array
        type: array
      id:
        type: string
      inherited_permissions:
        items:
          items:
            type: string
          type: array
        type: array
      name:
        type: string
      own_permissions:
        items:
          items:
            type: string
          type: array
        type: array
      parent_id:
        type: string
    type: object
  model.RoleResponse:
    properties:
      description:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  model.TokenResponse:
    properties:
      access_token:
        type: string
      expires_at:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  model.UpdateMemberRequest:
    properties:
      role_id:
        type: string
      status:
        enum:
        - active
        - suspended
        type: string
    type: object
  model.UpdateOrganizationRequest:
    properties:
      name:
        maxLength: 100
        minLength: 3
        type: string
      settings:
        additionalProperties: true
        type: object
      status:
        enum:
        - active
        - suspended
        type: string
    type: object
  model.UpdatePermissionRequest:
    properties:
      new_permission:
        items:
          type: string
        maxItems: 4
        minItems: 4
        type: array
      old_permission:
        items:
          type: string
        maxItems: 4
        minItems: 4
        type: array
    required:
    - new_permission
    - old_permission
    type: object
  model.UpdateRoleRequest:
    properties:
      description:
        type: string
    required:
    - description
    type: object
  model.UpdateUserRequest:
    properties:
      name:
        maxLength: 100
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      username:
        maxLength: 100
        minLength: 6
        type: string
    required:
    - username
    type: object
  model.UpdateUserStatusRequest:
    properties:
      status:
        enum:
        - active
        - suspended
        - banned
        type: string
    required:
    - status
    type: object
  model.UserInfo:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  model.UserOrganizationsResponse:
    properties:
      organizations:
        items:
          $ref: '#/definitions/model.OrganizationResponse'
        type: array
      total:
        type: integer
    type: object
  model.UserResponse:
    properties:
      avatar_url:
        type: string
      created_at:
        type: integer
      email:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: string
      updated_at:
        type: integer
      username:
        type: string
    type: object
  model.VerifyEmailRequest:
    properties:
      token:
        maxLength: 500
        type: string
    required:
    - token
    type: object
  querybuilder.DynamicFilter:
    properties:
      filter:
        additionalProperties:
          $ref: '#/definitions/querybuilder.Filter'
        type: object
      page:
        minimum: 1
        type: integer
      page_size:
        maximum: 100
        minimum: 1
        type: integer
      sort:
        items:
          $ref: '#/definitions/querybuilder.SortModel'
        type: array
    type: object
  querybuilder.Filter:
    properties:
      from: {}
      to: {}
      type:
        enum:
        - equals
        - contains
        - in
        - between
        - gt
        - gte
        - lt
        - lte
        - ne
        type: string
    required:
    - type
    type: object
  querybuilder.SortModel:
    properties:
      colId:
        maxLength: 100
        type: string
      sort:
        enum:
        - asc
        - desc
        - ASC
        - DESC
        type: string
    required:
    - colId
    - sort
    type: object
  response.PageMetadata:
    properties:
      limit:
        type: integer
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
      total_item:
        type: integer
      total_page:
        type: integer
    type: object
  response.SwaggerAccessRightListResponseWrapper:
    properties:
      data:
        $ref: '#/definitions/model.AccessRightListResponse'
      paging:
        $ref: '#/definitions/response.PageMetadata'
    type: object
  response.SwaggerAccessRightResponseWrapper:
    properties:
      data:
        $ref: '#/definitions/model.AccessRightResponse'
      paging:
        $ref: '#/definitions/response.PageMetadata'
    type: object
  response.SwaggerAuditLogListResponseWrapper:
    properties:
      data:
        items:
          additionalProperties: true
          type: object
        type: array
      paging:
        $ref: '#/definitions/response.PageMetadata'
    type: object
  response.SwaggerEndpointListResponseWrapper:
    properties:
      data:
        items:
          $ref: '#/definitions/model.EndpointResponse'
        type: array
      paging:
        $ref: '#/definitions/response.PageMetadata'
    type: object
  response.SwaggerEndpointResponseWrapper:
    properties:
      data:
        $ref: '#/definitions/model.EndpointResponse'
      paging:
        $ref: '#/definitions/response.PageMetadata'
    type: object
  response.SwaggerErrorResponseWrapper:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  response.SwaggerGeneralResponseWrapper:
    properties:
      data:
        additionalProperties:
          type: string
        type: object
      paging:
        $ref: '#/definitions/response.PageMetadata'
    type: object
  response.SwaggerLoginResponseWrapper:
    properties:
      data:
        $ref: '#/definitions/model.LoginResponse'
      paging:
        $ref: '#/definitions/response.PageMetadata'
    type: object
  response.SwaggerPermissionListResponseWrapper:
    properties:
      data:
        items:
          items:
            type: string
          type: array
        type: array
      paging:
        $ref: '#/definitions/response.PageMetadata'
    type: object
  response.SwaggerRoleListResponseWrapper:
    properties:
      data:
        items:
          $ref: '#/definitions/model.RoleResponse'
        type: array
      paging:
        $ref: '#/definitions/response.PageMetadata'
    type: object
  response.SwaggerRoleResponseWrapper:
    properties:
      data:
        $ref: '#/definitions/model.RoleResponse'
      paging:
        $ref: '#/definitions/response.PageMetadata'
    type: object
  response.SwaggerSuccessResponseWrapper:
    properties:
      data: {}
      paging:
        $ref: '#/definitions/response.PageMetadata'
    type: object
  response.SwaggerTokenResponseWrapper:
    properties:
      data:
        $ref: '#/definitions/model.TokenResponse'
      paging:
        $ref: '#/definitions/response.PageMetadata'
    type: object
  response.SwaggerUserListResponseWrapper:
    properties:
      data:
        items:
          $ref: '#/definitions/model.UserResponse'
        type: array
      paging:
        $ref: '#/definitions/response.PageMetadata'
    type: object
  response.SwaggerUserResponseWrapper:
    properties:
      data:
        $ref: '#/definitions/model.UserResponse'
      paging:
        $ref: '#/definitions/response.PageMetadata'
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a clean and modular boilerplate for Go REST APIs with RBAC,
    Audit Logs, and WebSockets.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Go Clean Boilerplate API
  version: "1.0"
paths:
  /access-rights:
    get:
      description: Retrieves a list of all available access rights.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SwaggerAccessRightListResponseWrapper'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
      security:
      - BearerAuth: []
      summary: List all access rights
      tags:
      - access-rights
    post:
      consumes:
      - application/json
      description: Creates a new access right (resource group).
      parameters:
      - description: Create Access Right Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateAccessRightRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.SwaggerAccessRightResponseWrapper'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "422":
          description: Validation Error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
      security:
      - BearerAuth: []
      summary: Create access right
      tags:
      - access-rights
  /access-rights/{id}:
    delete:
      description: Deletes an access right by ID.
      parameters:
      - description: Access Right ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Access right deleted successfully
          schema:
            $ref: '#/definitions/response.SwaggerGeneralResponseWrapper'
        "404":
          description: Access right not found
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
      security:
      - BearerAuth: []
      summary: Delete access right
      tags:
      - access-rights
  /access-rights/link:
    post:
      consumes:
      - application/json
      description: Associates an endpoint with a specific access right.
      parameters:
      - description: Link Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LinkEndpointRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Endpoint linked successfully
          schema:
            $ref: '#/definitions/response.SwaggerGeneralResponseWrapper'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "422":
          description: Validation Error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
      security:
      - BearerAuth: []
      summary: Link endpoint to access right
      tags:
      - access-rights
  /access-rights/search:
    post:
      consumes:
      - application/json
      description: Retrieves a list of access rights based on dynamic filter and sort
        criteria provided in the request body.
      parameters:
      - description: Dynamic filter and sort criteria
        in: body
        name: filter
        required: true
        schema:
          $ref: '#/definitions/querybuilder.DynamicFilter'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SwaggerAccessRightListResponseWrapper'
        "400":
          description: Invalid request body or filter criteria
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
      security:
      - BearerAuth: []
      summary: Get access rights with dynamic filters
      tags:
      - access-rights
  /access-rights/unlink:
    post:
      consumes:
      - application/json
      description: Removes an association between an endpoint and a specific access
        right.
      parameters:
      - description: Unlink Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LinkEndpointRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Endpoint unlinked successfully
          schema:
            $ref: '#/definitions/response.SwaggerGeneralResponseWrapper'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "422":
          description: Validation Error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
      security:
      - BearerAuth: []
      summary: Unlink endpoint from access right
      tags:
      - access-rights
  /audit-logs/export:
    get:
      description: Exports audit logs to CSV format within a date range.
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: from_date
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: to_date
        type: string
      produces:
      - text/csv
      responses:
        "200":
          description: CSV file download
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
      security:
      - BearerAuth: []
      summary: Export audit logs
      tags:
      - audit-logs
  /audit-logs/search:
    post:
      consumes:
      - application/json
      description: Retrieves audit logs with dynamic filtering and pagination.
      parameters:
      - description: Dynamic filter and sort criteria
        in: body
        name: filter
        required: true
        schema:
          $ref: '#/definitions/querybuilder.DynamicFilter'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SwaggerAuditLogListResponseWrapper'
        "400":
          description: Invalid filter format
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "422":
          description: Validation Error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
      security:
      - BearerAuth: []
      summary: Search audit logs
      tags:
      - audit-logs
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a password reset email if the account exists.
      parameters:
      - description: Forgot password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SwaggerGeneralResponseWrapper'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "422":
          description: Validation Error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
      summary: Request password reset
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns access token and user info.
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SwaggerLoginResponseWrapper'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "422":
          description: Validation Error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
      summary: User login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes the current session and clears refresh token cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SwaggerGeneralResponseWrapper'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.SwaggerErrorResponseWrapper'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - auth
  /auth/me:
    get:
      consumes:
      - application/json
      description: Returns the currently authenticated user's information.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SwaggerGeneralResponseWrapper'
        "401":
