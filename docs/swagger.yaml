paths:
  /access-rights:
    get:
      description: Retrieves a list of all available access rights.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_go-clean-boilerplate_pkg_response.SwaggerAccessRightListResponseWrapper'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_go-clean-boilerplate_pkg_response.SwaggerErrorResponseWrapper'
      security:
      - BearerAuth: []
      summary: List all access rights
      tags:
      - access-rights
    post:
      consumes:
      - application/json
      description: Creates a new access right (resource group).
      parameters:
      - description: Create Access Right Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Roisfaozi_go-clean-boilerplate_internal_modules_access_model.CreateAccessRightRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_go-clean-boilerplate_pkg_response.SwaggerAccessRightResponseWrapper'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_go-clean-boilerplate_pkg_response.SwaggerErrorResponseWrapper'
        "422":
          description: Validation Error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_go-clean-boilerplate_pkg_response.SwaggerErrorResponseWrapper'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_go-clean-boilerplate_pkg_response.SwaggerErrorResponseWrapper'
      security:
      - BearerAuth: []
      summary: Create access right
      tags:
      - access-rights
  /access-rights/{id}:
    delete:
      description: Deletes an access right by ID.
      parameters:
      - description: Access Right ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Access right deleted successfully
          schema:
            $ref: '#/definitions/github_com_Roisfaozi_go-clean-boilerplate_pkg_response.SwaggerGeneralResponseWrapper'
        "404":
