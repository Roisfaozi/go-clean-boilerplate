name: CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0 # Matches local environment setup where tests pass without CGO

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run Linter
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=5m --out-format=colored-line-number

    - name: Run Tests
      run: go test -v ./...

  build:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    env:
      CGO_ENABLED: 0

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Build API
      run: go build -v -o dist/api ./cmd/api/main.go

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: api-binary
        path: dist/api

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [lint-and-test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: api-binary
        path: dist

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/api
        draft: false
        prerelease: false
        generate_release_notes: true
