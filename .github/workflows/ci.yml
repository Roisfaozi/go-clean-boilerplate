name: CI (Integration & Quality)

on:
  push:
    branches: [ "**" ] # Run on all branches
  pull_request:
    branches: [ "**" ] # Run on all PRs

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run Linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  test-coverage:
    name: Unit Test & Coverage
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run Tests with Coverage
        run: go test -v -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.txt

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run Benchmarks
        # Runs benchmarks matching '.' (all), allocs stats, 1s duration
        run: go test -run=^$ -bench=. -benchmem -benchtime=1s ./...

  build-check:
    name: Build Integrity Check
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Dry Run Build
        # Ensures the code compiles successfully without producing output artifact
        run: go build -v -o /dev/null ./cmd/api/main.go
