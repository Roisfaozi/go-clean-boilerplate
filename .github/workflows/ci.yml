name: CI (Integration & Quality)

on:
  push:
    branches: [ "**" ] # Run on all branches
    tags: [ "v*" ]     # Run on version tags
  pull_request:
    branches: [ "**" ] # Run on all PRs

jobs:
  lint:
    name: Lint & Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true

      - name: Run Linter
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest
          args: --timeout=5m --fix

  test:
    name: Comprehensive Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run All Tests (Unit, Integration, E2E) with Coverage
        run: make test-coverage-all
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Run Benchmarks
        run: make bench

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_all.html
        if: always()

  build-check:
    name: Build & Compilation Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true

      - name: Dry Run Build
        run: go build -v -o /dev/null ./cmd/api/main.go
