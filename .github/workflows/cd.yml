name: CD (Build & Deploy)

on:
  push:
    branches:
      - main
      - staging
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=long
            # Tag 'staging' for pushes to staging branch
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}
            # Tag 'latest' for pushes to main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    name: Deploy to Staging
    needs: docker
    if: github.ref == 'refs/heads/staging'
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_KEY }}
          script: |
            echo "🚀 Deploying to Staging..."
            # Assumes the repo is cloned at /app/staging and docker-compose is set up
            cd /app/staging
            
            # Update code/config
            git pull origin staging
            
            # Pull new image specifically tagged 'staging'
            docker compose -f docker-compose.prod.yml pull
            
            # Execute Blue-Green Deploy script
            bash deploy/scripts/deploy.sh

  deploy-production:
    name: Deploy to Production
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_KEY }}
          script: |
            echo "🚀 Deploying to Production..."
            # Assumes the repo is cloned at /app/production
            cd /app/production
            
            # Update code
            git pull origin main
            
            # Pull latest image
            docker compose -f docker-compose.prod.yml pull
            
            # Execute Blue-Green Deploy script
            bash deploy/scripts/deploy.sh

  release:
    name: Create GitHub Release
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build Binary
        env:
          CGO_ENABLED: 0
        run: go build -v -ldflags="-w -s" -o dist/api ./cmd/api/main.go

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/api
          draft: false
          prerelease: false
          generate_release_notes: true
