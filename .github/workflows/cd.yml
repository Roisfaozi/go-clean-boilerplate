name: CD (Build & Deploy)

on:
  workflow_run:
    workflows: ["CI (Integration & Quality)"]
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    # Only run if CI succeeded AND branch is main/staging or it's a tag
    if: >
      ${{ github.event.workflow_run.conclusion == 'success' }} &&
      (
        github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'staging' ||
        startsWith(github.event.workflow_run.head_branch, 'v')
      )
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Checkout the exact commit that triggered the CI run
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event.workflow_run.head_branch == 'main' }}
            type=raw,value=staging,enable=${{ github.event.workflow_run.head_branch == 'staging' }}
            type=semver,pattern={{version}},value=${{ github.event.workflow_run.head_branch }}
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    name: Deploy to Staging
    needs: docker
    if: ${{ github.event.workflow_run.head_branch == 'staging' }}
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_KEY }}
          script: |
            echo "🚀 Deploying to Staging..."
            cd /app/staging
            git pull origin staging
            docker compose -f docker-compose.prod.yml pull
            bash deploy/scripts/deploy.sh

  deploy-production:
    name: Deploy to Production
    needs: docker
    if: ${{ github.event.workflow_run.head_branch == 'main' }}
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_KEY }}
          script: |
            echo "🚀 Deploying to Production..."
            cd /app/production
            git pull origin main
            docker compose -f docker-compose.prod.yml pull
            bash deploy/scripts/deploy.sh

  release:
    name: Create GitHub Release
    needs: docker
    # Check if the branch name starts with 'v' (tags are passed as head_branch in workflow_run context for tags)
    if: startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build Binary
        env:
          CGO_ENABLED: 0
        run: go build -v -ldflags="-w -s" -o dist/api ./cmd/api/main.go

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # We need to explicitly set the tag_name because we are running in workflow_run context (default branch)
          tag_name: ${{ github.event.workflow_run.head_branch }}
          files: dist/api
          draft: false
          prerelease: false
          generate_release_notes: true